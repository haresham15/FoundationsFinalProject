<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red-Black Tree Visualizer</title>
    <meta name="description" content="Interactive Red-Black Tree visualization tool with step-by-step insert, delete, and search operations.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header" id="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <circle cx="14" cy="6" r="5" fill="#f85149" stroke="#30363d" stroke-width="1.5"/>
                            <circle cx="7" cy="20" r="5" fill="#1a1a2e" stroke="#f85149" stroke-width="1.5"/>
                            <circle cx="21" cy="20" r="5" fill="#1a1a2e" stroke="#f85149" stroke-width="1.5"/>
                            <line x1="14" y1="11" x2="7" y2="15" stroke="#484f58" stroke-width="1.5"/>
                            <line x1="14" y1="11" x2="21" y2="15" stroke="#484f58" stroke-width="1.5"/>
                        </svg>
                    </div>
                    <h1>Red-Black Tree <span class="accent">Visualizer</span></h1>
                </div>
                <div class="stats-bar" id="stats-bar">
                    <div class="stat">
                        <span class="stat-label">Nodes</span>
                        <span class="stat-value" id="stat-nodes">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Height</span>
                        <span class="stat-value" id="stat-height">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Black-Height</span>
                        <span class="stat-value" id="stat-bh">0</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Controls Panel -->
            <aside class="controls-panel" id="controls-panel">
                <div class="control-group">
                    <label class="control-label">Insert Node</label>
                    <div class="input-row">
                        <input type="number" id="insert-input" class="input-field" placeholder="Key value" aria-label="Insert key value">
                        <button class="btn btn-primary" id="insert-btn" onclick="handleInsert()">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z"/></svg>
                            Insert
                        </button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Delete Node</label>
                    <div class="input-row">
                        <input type="number" id="delete-input" class="input-field" placeholder="Key value" aria-label="Delete key value">
                        <button class="btn btn-danger" id="delete-btn" onclick="handleDelete()">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/></svg>
                            Delete
                        </button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Search Node</label>
                    <div class="input-row">
                        <input type="number" id="search-input" class="input-field" placeholder="Key value" aria-label="Search key value">
                        <button class="btn btn-search" id="search-btn" onclick="handleSearch()">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 7a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.04a.75.75 0 11-1.06 1.06l-3.04-3.04z"/></svg>
                            Search
                        </button>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="control-group">
                    <label class="control-label">Quick Actions</label>
                    <div class="btn-grid">
                        <button class="btn btn-secondary" id="random-btn" onclick="handleRandomInsert()">
                            Random Insert
                        </button>
                        <button class="btn btn-secondary" id="random-tree-btn" onclick="handleRandomTree()">
                            Random Tree
                        </button>
                        <button class="btn btn-secondary" id="sample-btn" onclick="handleSampleTree()">
                            Sample Tree
                        </button>
                        <button class="btn btn-ghost" id="clear-btn" onclick="handleClear()">
                            Clear Tree
                        </button>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="control-group">
                    <label class="control-label">Traversal</label>
                    <div class="btn-grid">
                        <button class="btn btn-secondary btn-sm" onclick="handleTraversal('inorder')">In-Order</button>
                        <button class="btn btn-secondary btn-sm" onclick="handleTraversal('preorder')">Pre-Order</button>
                        <button class="btn btn-secondary btn-sm" onclick="handleTraversal('postorder')">Post-Order</button>
                    </div>
                    <div class="traversal-output" id="traversal-output"></div>
                </div>

                <div class="divider"></div>

                <!-- Operation Log -->
                <div class="control-group">
                    <label class="control-label">Operation Log</label>
                    <div class="log-container" id="log-container">
                        <div class="log-entry log-info">Ready. Insert a node to begin.</div>
                    </div>
                </div>
            </aside>

            <!-- Canvas Area -->
            <div class="canvas-container" id="canvas-container">
                <canvas id="tree-canvas"></canvas>
                <div class="empty-state" id="empty-state">
                    <div class="empty-icon">
                        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                            <circle cx="32" cy="16" r="10" fill="#21262d" stroke="#30363d" stroke-width="2"/>
                            <circle cx="16" cy="44" r="8" fill="#21262d" stroke="#30363d" stroke-width="2"/>
                            <circle cx="48" cy="44" r="8" fill="#21262d" stroke="#30363d" stroke-width="2"/>
                            <line x1="32" y1="26" x2="16" y2="36" stroke="#30363d" stroke-width="2"/>
                            <line x1="32" y1="26" x2="48" y2="36" stroke="#30363d" stroke-width="2"/>
                        </svg>
                    </div>
                    <p class="empty-text">Insert a node to visualize the tree</p>
                    <p class="empty-hint">Or click <strong>Sample Tree</strong> to see an example</p>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
